<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabajo Practico</title>
    <script src="EjercicioIntroduccion.js"></script>
    <style>
        body {
            font-family: sans-serif;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .header-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-container img {
            max-width: 300px;
            height: auto;
            border-radius: 8px;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            width: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 20px;
        }

        .card img {
            max-width: 150px;
            height: auto;
            border-radius: 4px;
        }

        .price {
            font-weight: bold;
            color: #333;
        }

        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 10px;
        }

        button:hover {
            background-color: #218838;
        }

        .dark-mode {
            background-color: #222;
            color: #fff;
        }

        .dark-mode .card {
            border-color: #444;
            background-color: #333;
        }

        .dark-mode .price {
            color: #eee;
        }

        .controls {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header-container">
        <img src="https://kasaneteto-plush.com/wp-content/uploads/2026/01/Kasane-Teto-Plush-With-Hairpin-300x300.png" alt="Kasane Teto Plush">
        <h1>Kasane Teto Plush</h1>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150" alt="Kasane Teto Plush">
        <h3>Kasane Teto Plush</h3>
        <p class="price">$100.000</p>
        <button>Añadir al carrito</button>
    </div>

    <div class="controls">
        <p>Clicks: <span id="contador">0</span></p>
        <button id="btn">Incrementar</button>
        <br><br>
        <button id="toggleTheme">Cambiar Modo</button>
    </div>

    <script>
        const display = document.getElementById('contador');
        const boton = document.getElementById('btn');
        let cuenta = 0;

        boton.addEventListener('click', () => {
            cuenta++;
            display.textContent = cuenta;
        });
        const btnTheme = document.getElementById('toggleTheme');
        btnTheme.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
        });
    </script>

</body>
</html>
